</button>

<!-- Main Content Area -->

<!-- Transaction Type Switcher -->
<section class="mb-lg">
<div class="bg-surface-container-low p-1 rounded-xl flex gap-1 border border-outline-variant">
<button class="flex-1 py-3 rounded-lg font-label-md text-label-md transition-all duration-200 bg-surface-container-highest text-on-surface shadow-sm" id="type-expense" onclick="toggleType('expense')">
                    Pengeluaran
                </button>

                </button>
</div>
</section>
<!-- Form Fields -->
<div class="space-y-lg">

<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs">Nominal Transaksi</label>
<div class="flex items-baseline gap-2">
<span class="font-headline-md text-headline-md text-on-surface-variant">Rp</span>

<!-- Micro-interaction Scripts -->
<script>
        function toggleType(type) {
            const expenseBtn = document.getElementById('type-expense');
            const incomeBtn = document.getElementById('type-income');
            const activeClasses = ['bg-surface-container-highest', 'text-on-surface', 'shadow-sm'];
            const inactiveClasses = ['text-on-surface-variant', 'hover:bg-surface-container-high'];

            if (type === 'expense') {
                expenseBtn.classList.add(...activeClasses);
                expenseBtn.classList.remove(...inactiveClasses);
                incomeBtn.classList.remove(...activeClasses);
                incomeBtn.classList.add(...inactiveClasses);
            } else {
                incomeBtn.classList.add(...activeClasses);
                incomeBtn.classList.remove(...inactiveClasses);
                expenseBtn.classList.remove(...activeClasses);
                expenseBtn.classList.add(...inactiveClasses);
            }
        }

        // Category selection behavior
        const categoryBtns = document.querySelectorAll('button[class*="rounded-full"]');
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => {
                    b.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'border-secondary');
                    b.classList.add('bg-surface-container-lowest', 'text-on-surface', 'border-outline-variant');
                });
                btn.classList.add('bg-secondary-container', 'text-on-secondary-container', 'border-secondary');
                btn.classList.remove('bg-surface-container-lowest', 'text-on-surface', 'border-outline-variant');
            });
        });

        // Initialize with default date
        const dateInput = document.querySelector('input[type="date"]');
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        dateInput.value = `${year}-${month}-${day}`;
    </script>
